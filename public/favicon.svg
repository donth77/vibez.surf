<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="vibez.surf">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#03050a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"  stop-color="#2360c4"/>
      <stop offset="50%" stop-color="#6cf"/>
      <stop offset="100%" stop-color="#8ad"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Two overlapping sine waves to suggest "vibes" / music. Offset in y
       and phase; rendered with a subtle bloom so the icon reads as
       neon-on-dark at small sizes. -->
  <g filter="url(#glow)" fill="none" stroke-linecap="round">
    <path d="M 8 36 Q 20 18, 32 36 T 56 36"
          stroke="url(#wave)"
          stroke-width="5"
          opacity="0.95"/>
    <path d="M 8 28 Q 20 46, 32 28 T 56 28"
          stroke="url(#wave)"
          stroke-width="3"
          opacity="0.55"/>
  </g>
</svg>
