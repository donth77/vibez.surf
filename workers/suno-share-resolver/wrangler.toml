name = "suno-share-resolver"
main = "src/worker.ts"
compatibility_date = "2024-06-01"

# Comma-separated CORS allowlist. Includes localhost:5173 for Vite dev
# so you can test against the deployed Worker without rebuilding just to
# ship a different origin. Override per-env via Cloudflare dashboard →
# Worker → Settings → Variables.
[vars]
ALLOWED_ORIGIN = "https://vibez.surf,https://www.vibez.surf,http://localhost:5173"
