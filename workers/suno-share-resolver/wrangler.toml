name = "suno-share-resolver"
main = "src/worker.ts"
compatibility_date = "2024-06-01"

# Restrict CORS to vibez.surf only. Without this set, anyone's site can
# call the Worker and (if viral) drain the 100k/day free-tier quota.
# Override per-env via Cloudflare dashboard → Worker → Settings → Variables.
[vars]
ALLOWED_ORIGIN = "https://vibez.surf"
